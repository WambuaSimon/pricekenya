{% if rows %}
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    {% for product, min_price, offer_count in rows %}
      <a href="/p/{{ product.slug }}" class="block bg-white border rounded-lg p-3 hover:shadow-sm dark:bg-slate-900 dark:border-slate-800 dark:hover:border-slate-700">
        <div class="aspect-square bg-slate-100 rounded mb-2 flex items-center justify-center overflow-hidden dark:bg-slate-800">
          {% if product.image_url %}
            <img src="{{ product.image_url }}" alt="{{ product.title }}" loading="lazy"
              class="object-contain w-full h-full"
              onerror="this.style.display='none'">
          {% else %}
            <span class="text-slate-400 text-xs dark:text-slate-500">no image yet</span>
          {% endif %}
        </div>
        <div class="text-sm font-medium line-clamp-2">{{ product.title }}</div>
        <div class="mt-1 text-base font-semibold">{{ min_price | kes }}</div>
        <div class="text-xs text-slate-500 dark:text-slate-400">{{ offer_count }} offer{{ '' if offer_count == 1 else 's' }}</div>
      </a>
    {% endfor %}
  </div>
{% else %}
  <div class="text-slate-500 text-sm py-12 text-center dark:text-slate-400">No products yet.</div>
{% endif %}
