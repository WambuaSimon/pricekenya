{# HTMX fragment returned after POST /reviews. Swaps the review form on
   the product page with a "check your email" confirmation. #}
<div class="rounded-lg border border-emerald-200 bg-emerald-50 p-4 text-sm text-emerald-900 dark:border-emerald-900 dark:bg-emerald-950/40 dark:text-emerald-100">
  <div class="font-medium">Almost there — check your inbox.</div>
  <p class="mt-1 leading-snug">
    We sent a verification link to <span class="font-mono">{{ email }}</span>.
    Click it to publish your review. It stays hidden until then.
  </p>
</div>
