<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}PriceKenya — compare prices in Kenya{% endblock %}</title>
  <meta name="description" content="{% block description %}Compare prices from Jumia, Kilimall and more across Kenya. See price history and get drop alerts.{% endblock %}">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.svg">
  <link rel="mask-icon" href="/static/favicon.svg" color="#059669">
  <meta name="theme-color" content="#059669" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <script>
    // Apply saved (or system) theme before first paint to avoid FOUC.
    (function () {
      try {
        var t = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (!t && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  {% block head_extra %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <header class="border-b bg-white dark:bg-slate-900 dark:border-slate-800">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="/" class="flex items-center gap-2 font-bold text-lg text-slate-900 hover:text-slate-700 dark:text-slate-100 dark:hover:text-slate-300">
        <img src="/static/logo.svg" alt="" class="w-8 h-8" width="32" height="32">
        <span>PriceKenya</span>
      </a>
      <form action="/search" method="get" class="flex-1">
        <input
          name="q"
          value="{{ q or '' }}"
          placeholder="Search products, brands or models…"
          class="w-full rounded-lg border px-3 py-2 text-sm bg-white dark:bg-slate-800 dark:border-slate-700 dark:text-slate-100 dark:placeholder-slate-400"
          hx-get="/search"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#results"
          hx-push-url="true">
      </form>
      <button
        id="theme-toggle"
        type="button"
        aria-label="Toggle dark mode"
        title="Toggle dark mode"
        class="shrink-0 inline-flex items-center justify-center w-9 h-9 rounded-lg border text-slate-600 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">
        <svg class="w-4 h-4 block dark:hidden" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        <svg class="w-4 h-4 hidden dark:block" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.95 2.05a1 1 0 010 1.414l-.707.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-2.05 4.95a1 1 0 01-1.414 0l-.707-.707a1 1 0 111.414-1.414l.707.707a1 1 0 010 1.414zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.95-1.05a1 1 0 011.414 1.414l-.707.707a1 1 0 11-1.414-1.414l.707-.707zM4 10a1 1 0 01-1 1H2a1 1 0 110-2h1a1 1 0 011 1zm1.05-4.95a1 1 0 011.414-1.414l.707.707A1 1 0 015.757 5.757l-.707-.707zM10 6a4 4 0 100 8 4 4 0 000-8z"/></svg>
      </button>
    </div>
  </header>
  {% if nav_categories() %}{% include "partials/_category_nav.html" %}{% endif %}
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <footer class="mt-12">
    <div class="max-w-5xl mx-auto px-4 py-6 text-xs text-slate-500 dark:text-slate-400 flex flex-wrap gap-x-4 gap-y-2">
      <span>PriceKenya · Always verify on the merchant site before buying.</span>
      <span class="ml-auto flex gap-4">
        <a href="/privacy" class="hover:text-slate-700 dark:hover:text-slate-300">Privacy</a>
        <a href="/terms" class="hover:text-slate-700 dark:hover:text-slate-300">Terms</a>
      </span>
    </div>
  </footer>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var isDark = document.documentElement.classList.toggle('dark');
        try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
