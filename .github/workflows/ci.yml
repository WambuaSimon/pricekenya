name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Seed sample DB
        # test_reviews.py and test_sitemap_cache.py exercise handlers
        # against real Products (the fixture comment says "CI seeds
        # enough via seed.load if the DB is empty"). init_db + a handful
        # of sample rows is enough to satisfy every non-fixture-scoped
        # test — the isolated in-memory fixture tests are unaffected.
        run: python -m seed.load
      - name: Pytest
        run: pytest -q
