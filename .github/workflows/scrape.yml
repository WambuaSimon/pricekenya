name: Scheduled scrape

on:
  schedule:
    # Every 6 hours, at :17 past to avoid the top-of-hour Actions rush
    - cron: '17 */6 * * *'
  workflow_dispatch:  # allow manual runs from the Actions tab

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 45 min covers the current 24 merchant×category combinations with
    # 2s polite delays + fetches + DB writes. Bump again if we grow.
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCRAPER_USER_AGENT: "PriceKenyaBot/0.1 (+https://pricekenya.onrender.com)"
      SCRAPER_REQUEST_DELAY_SECONDS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -e .
      - name: Seed category tree
        # Idempotent — upserts by slug. Required so /c/<slug> routes resolve
        # against an empty Neon after a reset.
        run: python -m seed.categories
      - name: Scrape all merchants
        run: python -m scrapers.ingest all
      - name: Dispatch price-drop alerts
        run: python -m alerts.dispatcher
