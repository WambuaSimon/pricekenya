name: Scheduled scrape

# Fan-out fan-in structure:
#   1. seed          — one job that upserts the Category tree (idempotent)
#   2. scrape        — matrix of jobs, one runner per merchant, run in parallel
#   3. alerts        — one job that runs the price-drop email dispatcher after
#                      all scrapes complete
# Total wall-clock cost is (slowest single merchant + a few min for install +
# alerts), typically ~20 min. Adding a new merchant costs only its own runtime,
# not extra time on the critical path.

on:
  schedule:
    # Every 6 hours, at :17 past to avoid the top-of-hour Actions rush
    - cron: '17 */6 * * *'
  workflow_dispatch:  # allow manual runs from the Actions tab

concurrency:
  group: scrape
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  BASE_URL: https://pricekenya.co.ke
  SCRAPER_USER_AGENT: "PriceKenyaBot/0.1 (+https://pricekenya.co.ke)"
  SCRAPER_REQUEST_DELAY_SECONDS: "2"
  # Alert dispatcher needs these to send real email + sign unsubscribe URLs.
  # Configure in repo settings → Secrets and variables → Actions.
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  ALERTS_FROM_EMAIL: "PriceKenya Alerts <alerts@pricekenya.co.ke>"
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -e .
      - name: Seed category tree
        run: python -m seed.categories

  scrape:
    needs: seed
    runs-on: ubuntu-latest
    # Each merchant gets 30 min. Hotpoint is the slowest (~15-18 min because
    # of per-product detail fetches for prices) so this leaves headroom.
    timeout-minutes: 30
    strategy:
      # One failing merchant shouldn't kill the others.
      fail-fast: false
      matrix:
        target:
          - all-phones          # Jumia + Kilimall phones
          - all-tablets         # Jumia + Kilimall tablets
          - all-laptops         # Jumia + Kilimall laptops
          - all-tvs             # Jumia + Kilimall TVs
          - all-refrigerators
          - all-washers
          - all-cooking
          - all-audio
          - all-cameras
          - all-blenders
          - all-toasters
          - all-kettles
          - all-irons
          - all-inverters       # Jumia + Kilimall + Hotpoint solar inverters
          - all-solar-panels    # Jumia + Kilimall + Hotpoint solar panels
          - all-solar-batteries # Jumia + Kilimall + Hotpoint solar batteries
          # Hotpoint split per leaf — the bundled `all-hotpoint` (9 legs
          # serial) regularly blew the 30-min budget because each leaf is
          # ~53 items × 2s polite delay × 2 (list + per-product detail
          # fetch). Same treatment we already gave `all-wc`.
          - hotpoint-tvs
          - hotpoint-refrigerators
          - hotpoint-washers
          - hotpoint-cooking
          - hotpoint-audio
          - hotpoint-blenders
          - hotpoint-toasters
          - hotpoint-kettles
          - hotpoint-irons
          - all-avechi          # 6 categories
          - all-istore          # 2 categories
          - all-gadgetworld     # 1 category
          - all-ramtons         # 7 categories
          - all-masoko          # 3 categories
          - all-naivas          # Livewire + curl_cffi (CF wall)
          - all-phoneplace      # WooCommerce + curl_cffi (CF wall)
          - phonesstore-ke      # WC Store API scraper (was multi-leg all-*)     # WooCommerce (no wall)
          - all-quickmart       # Growcer PHP + curl_cffi, hyphen paging
          - all-carrefour       # Next.js RSC parse + curl_cffi (Akamai wall)
          - all-xiaomi          # WooCommerce, xiaomistores.co.ke
          - all-mybigorder      # Kenyan marketplace, plain httpx, per-subcategory
          # WooCommerce batch — one leg per merchant so each gets its own
          # 30-min budget. Bundled `all-wc` hit the timeout at 14 merchants.
          - wc-dixons-ke
          - finetech-ke         # WC Store API scraper
          - wc-fivestar-ke
          - wc-jojabo-ke
          - wc-le-ke
          - wc-megatech-ke
          - wc-nairobitvshop-ke
          - wc-pixels-ke
          - wc-quest-ke
          - wc-smartdevices-ke
          - wc-smartphoneskenya-ke
          - wc-tclke-ke
          - wc-techonline-ke
          - wc-zurimall-ke
          - wc-zuka-ke
          - techstore-ke        # WC Store API scraper (was wc-*)
          - wc-devicestech-ke
          - wc-nairobilaptops-ke
          - wc-solarshop-ke     # solar specialist: inverters + batteries
          - wc-solarstore-ke    # solar specialist: hybrid inverters
          # sollatek moved to shopify_merchants (shop.sollatek.com) — picked
          # up automatically by the all-shopify matrix leg below.
          - audiocom-ke         # WC Store API scraper (was wc-*)
          - wc-camerastore-ke   # camera specialist
          - wc-eamobitech-ke    # cameras + computers
          - wc-housewife-ke     # kitchen appliances (long — may need retry)
          - wc-armco-ke         # Kenyan brand appliances
          - newmatic-ke         # WC Store API scraper (was wc-*) — built-in kitchen appliances
          - patabay-ke          # WC Store API scraper — unblocked (theme hid prices from cards)
          - wc-nextbuy-ke       # refurbished phones
          - pricepoint-ke       # WC Store API scraper (was wc-*)
          - wc-phoneshop-ke     # phones + gaming accessories
          - wc-hisense-kenya-ke # Cloudflare Turnstile — Playwright headless
          - wc-overtech-ke      # Cloudflare Turnstile — Playwright headless
          # Dedicated leg for brandcart so its outage signals cleanly
          # without waiting on the all-shopify batch to finish.
          - shopify-samsung-brandcart-ke
          - all-shopify         # Shopify batch (auto-picks all merchants from config)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -e ".[playwright]"
      # Chromium only downloads once per runner then caches; the ~200MB is
      # only paid for merchants that actually use client_type: "playwright".
      - name: Install chromium (Playwright merchants only)
        if: startsWith(matrix.target, 'wc-hisense-kenya') || startsWith(matrix.target, 'wc-overtech')
        run: playwright install chromium --with-deps
      - name: Scrape ${{ matrix.target }}
        run: python -m scrapers.ingest ${{ matrix.target }}

  alerts:
    needs: scrape
    # Even if some scrapes failed, still run alerts against whatever landed.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -e .
      - name: Dispatch price-drop alerts
        run: python -m alerts.dispatcher

  notify:
    # Post to Telegram when any scrape matrix leg failed. `needs.scrape.result`
    # is "success" only if EVERY leg passed, "failure" if any failed,
    # "cancelled" if the workflow was manually cancelled. We ping on the
    # first two so cancellations don't spam.
    #
    # Setup (one-time):
    #   1. Chat @BotFather on Telegram → /newbot → follow prompts → get bot token
    #   2. Start a chat with your new bot → send it any message
    #   3. Get your chat_id: curl "https://api.telegram.org/bot<TOKEN>/getUpdates"
    #      look for "chat":{"id":<number>...}
    #   4. In GH repo settings → Secrets and variables → Actions:
    #        TELEGRAM_BOT_TOKEN = <token from step 1>
    #        TELEGRAM_CHAT_ID   = <number from step 3>
    #   No secrets set = job silently no-ops (safe default; won't fail CI).
    needs: scrape
    if: always() && needs.scrape.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping notification."
            exit 0
          fi
          MSG="⚠️ PriceKenya scrape had one or more failing merchants.%0AView: ${RUN_URL}%0AOpen /admin/scrapes to see which merchants are now stale."
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data "disable_web_page_preview=true" \
            > /tmp/tg_resp.json
          # Fail the job if Telegram rejected the message so we see the
          # setup mistake in CI rather than silently missing alerts.
          if ! grep -q '"ok":true' /tmp/tg_resp.json; then
            echo "Telegram send failed:"; cat /tmp/tg_resp.json; exit 1
          fi
          echo "Telegram notification sent."
